name: chatter_app
description: A modern mobile communication app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  timeago: ^3.6.1

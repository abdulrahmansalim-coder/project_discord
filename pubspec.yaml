name: chatter_app
description: A modern mobile communication app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  emoji_picker_flutter: ^2.2.0
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
